name: Daily Code Review

on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of days to review (default: 1)'
        required: false
        default: '1'

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  code_review:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Analyze commits and generate changelog
        id: changelog
        run: |
          node scripts/code-review/analyze-commits.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect risk patterns
        id: risks
        run: |
          node scripts/code-review/detect-risks.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check test coverage
        id: tests
        run: |
          node scripts/code-review/check-tests.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Issue with review report
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const changelog = fs.readFileSync('./reports/changelog.md', 'utf8');
            const risks = fs.readFileSync('./reports/risks.md', 'utf8');
            const tests = fs.readFileSync('./reports/tests.md', 'utf8');
            
            const body = `# Daily Code Review Report - ${new Date().toLocaleDateString()}
            
## 📋 Changelog
${changelog}

## ⚠️ Risk Patterns Detected
${risks}

## 🧪 Test Coverage Analysis
${tests}

---
*Generated by Daily Code Review Automation*
`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily Code Review - ${new Date().toLocaleDateString()}`,
              body: body,
              labels: ['code-review', 'automated']
            });